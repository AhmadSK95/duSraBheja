providers:
  - name: nvidia_nim
    kind: nvidia_nim
    api_key_env: NVIDIA_API_KEY
    base_url: https://integrate.api.nvidia.com/v1
    models:
      classifier: meta/llama-3.1-8b-instruct
      reasoning: meta/llama-3.3-70b-instruct
      merge: meta/llama-3.3-70b-instruct
      public_chat: meta/llama-3.3-70b-instruct
      reasoning_heavy: nvidia/llama-3.1-nemotron-70b-instruct
      vision: meta/llama-3.2-11b-vision-instruct
      embed: nvidia/nv-embedqa-e5-v5

roles:
  - role: classifier
    provider: nvidia_nim
    model: meta/llama-3.1-8b-instruct

  - role: reasoning
    provider: nvidia_nim
    model: meta/llama-3.3-70b-instruct

  - role: merge
    provider: nvidia_nim
    model: meta/llama-3.3-70b-instruct

  - role: public_chat
    provider: nvidia_nim
    model: meta/llama-3.3-70b-instruct
    visibility: public

  - role: reasoning_heavy
    provider: nvidia_nim
    model: nvidia/llama-3.1-nemotron-70b-instruct

  - role: vision
    provider: nvidia_nim
    model: meta/llama-3.2-11b-vision-instruct

  - role: embed
    provider: nvidia_nim
    model: nvidia/nv-embedqa-e5-v5
